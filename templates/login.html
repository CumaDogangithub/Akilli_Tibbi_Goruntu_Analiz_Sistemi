<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Giriş · ATGAS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-arka">
  <div class="login-kart">
    <div class="logo">ATGAS</div>
    <div class="alt-baslik">Akıllı Tıbbi Görüntü Analiz Sistemi</div>

    <h2 style="margin-bottom:18px;">Sisteme Giriş Yap</h2>

    {% if hata %}
      <div class="alert alert-danger">⚠ {{ hata }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-grup">
        <label>E-posta Adresi</label>
        <input type="email" name="eposta" placeholder="doktor@hastane.com" required autofocus>
      </div>
      <div class="form-grup">
        <label>Şifre</label>
        <input type="password" name="sifre" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Giriş Yap</button>
    </form>

    <div class="alert alert-danger" style="margin-top:24px;">
      ⚠ Bu sistem yalnızca <b>yetkili sağlık personeline</b> açıktır.
      Yetkisiz erişim girişimleri kayıt altına alınmaktadır.
    </div>

    <div style="text-align:center; margin-top:16px; font-size:11px; color:var(--metin-sonuk);">
      Demo: <code>doktor@atgas.local</code> / <code>123456</code>
    </div>
  </div>
</body>
</html>
